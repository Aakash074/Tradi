---
# Tradi V3 production paper config (1.5:4.5 exits, ADX 20, dynamic sizing, 25% halt)
strategy: momentum_pullback_v3
asymmetric_exits: "1.5:4.5"  # 1.5% stop, 4.5% target (1:3 R/R)
adx_filter: 20
sizing: dynamic  # vol-adjusted, 4% base max 5%
universe: top_20_momentum
risk:
  halt_drawdown: 0.25
  daily_loss_limit: 0.05
enforcer:
  enabled: true
  forced_size: 0.005
  forced_time: "20:00"
agent:
  cycle_seconds: 900
  log_level: INFO
